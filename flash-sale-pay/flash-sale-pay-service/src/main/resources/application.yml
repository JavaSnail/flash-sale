server:
  port: 8085

spring:
  application:
    name: flash-sale-pay
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:161.118.240.213}:3306/flash_sale_pay?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:161.118.240.213:8848}
      discovery:
        server-addr: ${NACOS_ADDR:161.118.240.213:8848}
      config:
        server-addr: ${NACOS_ADDR:161.118.240.213:8848}
        import-check:
          enabled: false
  data:
    redis:
      host: ${REDIS_HOST:161.118.240.213}
      port: ${REDIS_PORT:6379}

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:161.118.240.213:9876}
  producer:
    group: pay-producer-group

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
